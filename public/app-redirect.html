<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookd</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(circle at center, rgba(0, 224, 84, 0.12) 0%, rgba(0, 224, 84, 0.04) 30%, #14181c 70%);
      background-color: #14181c;
      color: #d4d7dd;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .card {
      max-width: 400px;
    }
    .logo-img {
      width: 80px;
      height: 80px;
      margin-bottom: 8px;
      border-radius: 18px;
    }
    .logo-text {
      color: #00e054;
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .tagline {
      font-size: 16px;
      color: #8b95a5;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .btn {
      display: inline-block;
      background: #00e054;
      color: #ffffff;
      font-weight: 700;
      font-size: 16px;
      padding: 14px 36px;
      border-radius: 12px;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/bookd-logo.png" alt="Bookd" class="logo-img">
    <div class="logo-text">bookd.</div>
    <p class="tagline">Your football diary. Rate matches, write reviews, build lists.</p>
    <a class="btn" href="https://apps.apple.com/app/bookd/id6742044938">Get Bookd</a>
  </div>
</body>
</html>
